name: Deploy Changed Modules on PR Merge

on:
  push:
    branches:
      - master

jobs:
  detect-changes:
    runs-on: self-hosted
    outputs:
      changed_modules: ${{ steps.filter.outputs.changed }}
      should_deploy_app: ${{ steps.filter.outputs.should_deploy_app }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 2

      - name: Detect changed top-level modules
        id: filter
        run: |
          echo "=== Git 상태 확인 ==="
          git log --oneline -3
          echo ""
          
          echo "=== 변경 감지 시작 ==="
          if git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
            echo "HEAD~1 exists, using git diff"
            CHANGED=$(git diff --name-only HEAD~1 HEAD | cut -d/ -f1 | sort -u | tr '\n' ' ')
          elif [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            echo "Using github.event.before: ${{ github.event.before }}"
            CHANGED=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} | cut -d/ -f1 | sort -u | tr '\n' ' ')
          else
            echo "Fallback: using git show"
            CHANGED=$(git show --name-only --pretty=format: ${{ github.sha }} | cut -d/ -f1 | sort -u | tr '\n' ' ')
          fi
          
          if [ -z "$CHANGED" ] || [ "$CHANGED" = " " ]; then
            echo "No changes detected, including all modules"
            CHANGED="app utils"
          fi
          
          echo "Final result: '$CHANGED'"
          echo "changed=$CHANGED" >> $GITHUB_OUTPUT
          
          # app 배포 여부 결정 (app 또는 utils 변경시 app 배포)
          if echo "$CHANGED" | grep -q -E "(app|utils)"; then
            echo "App should be deployed (app or utils changed)"
            echo "should_deploy_app=true" >> $GITHUB_OUTPUT
          else
            echo "App deployment not needed"
            echo "should_deploy_app=false" >> $GITHUB_OUTPUT
          fi

  deploy-app:
    needs: detect-changes
    runs-on: self-hosted
    if: needs.detect-changes.outputs.should_deploy_app == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

#      - name: Log in to local Docker Registry
#        run: echo ${{ secrets.REGISTRY_PASS }} | docker login localhost:5000 -u ${{ secrets.REGISTRY_USER }} --password-stdin

      - name: Build and push Docker image
        run: |
          IMAGE_TAG=${{ github.sha }}
          # 프로젝트 루트에서 app 모듈 빌드
          docker build -f Dockerfile -t localhost:5000/app:$IMAGE_TAG .
          docker push localhost:5000/app:$IMAGE_TAG

      - name: Configure Git auth
        run: |
          git config --global user.name "ohsaeudev"
          git config --global user.email "ohsaeudev@gmail.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}

      - name: Update Helm chart and push
        run: |
          IMAGE_TAG=${{ github.sha }}
          sed -i "s/tag:.*/tag: $IMAGE_TAG/" helm/app/values.yaml
          git add helm/app/values.yaml
          git commit -m "Update app image tag to $IMAGE_TAG"
          git push
