apiVersion: v1
kind: Service
metadata:
  name: {{ include "gitopstest1.fullname" . }}
  labels:
    {{- include "gitopstest1.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      {{- if .Values.service.nodePort }}
      nodePort: {{ .Values.service.nodePort }}
      {{- end }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "gitopstest1.selectorLabels" . | nindent 4 }}
